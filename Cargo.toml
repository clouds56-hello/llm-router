[package]
name = "llm-router"
version = "0.1.0"
edition = "2021"
description = "Turn a GitHub Copilot subscription into a local OpenAI-compatible API"
license = "MIT OR Apache-2.0"
readme = "README.md"

[[bin]]
name = "llm-router"
path = "src/main.rs"

[dependencies]
snafu = "0.8"
anyhow = "1"  # transitional during snafu migration; removed at end
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", features = ["macros"] }
tower = "0.5"
tower-http = { version = "0.5", features = ["trace", "cors", "request-id", "util"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls", "socks"] }
futures = "0.3"
futures-util = "0.3"
eventsource-stream = "0.2"
async-trait = "0.1"
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
toml_edit = "0.22"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
uuid = { version = "1", features = ["v4"] }
http = "1"
directories = "5"
parking_lot = "0.12"
rusqlite = { version = "0.31", features = ["bundled"] }
time = { version = "0.3", features = ["formatting", "parsing", "macros"] }
humantime = "2"
rpassword = "7"
inquire = { version = "0.7", default-features = false, features = ["crossterm"] }
arc-swap = "1"
notify = "6"
sha2 = "0.10.9"

[profile.release]
lto = "thin"
strip = true
codegen-units = 1

# Built-in persona profiles. The user may extend or override these by adding
# matching sections to ~/.config/llm-router/profiles.toml (user wins on
# conflict at the (persona, upstream, header) level).
#
# Schema:
#   [<persona>.<scope>]
#   verified  = bool   # if false, llm-router emits a tracing::warn! on use
#   <header>  = "..."  # wire-form header names (kebab-case)
#
# <scope> is one of:
#   default            -> always merged for this persona
#   <upstream-id>      -> merged when sending to that upstream (e.g. github-copilot)
#   general            -> fallback merged only when no <upstream-id> matches
#
# Merge order per request, last wins:
#   compile-time defaults
#     <- [persona.default]
#     <- [persona.<upstream>] if exists, else [persona.general] if exists
#     <- user [copilot] explicit fields
#     <- per-account [accounts.<id>.copilot] overrides
#     <- inbound X-* request headers (where applicable)

# ---------------------------------------------------------------------------
# copilot — verified against VS Code Copilot Chat 0.20.x
# ---------------------------------------------------------------------------
[copilot.default]
verified = true
editor-version          = "vscode/1.95.0"
editor-plugin-version   = "copilot-chat/0.20.0"
user-agent              = "GitHubCopilotChat/0.20.0"
copilot-integration-id  = "vscode-chat"
openai-intent           = "conversation-panel"

# ---------------------------------------------------------------------------
# opencode — placeholders. Real values welcome via PR.
# ---------------------------------------------------------------------------
[opencode.default]
verified = false
user-agent = "opencode/0.x"

[opencode.general]
verified = false

[opencode.github-copilot]
verified = false
editor-version          = "opencode/0.x"
editor-plugin-version   = "opencode/0.x"
user-agent              = "opencode/0.x"
copilot-integration-id  = "vscode-chat"
openai-intent           = "conversation-panel"


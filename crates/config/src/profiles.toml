# Built-in persona profiles. The user may extend or override these by adding
# matching sections to ~/.config/tokn-router/profiles.toml.
#
# `forward` is an allow-list of inbound headers that the persona may preserve.
# Router-controlled headers (authorization, content-type, accept, host, etc.)
# are always controlled by tokn-router/provider code and ignored here.

[copilot]
verified = true
forward = [
  "x-initiator",
  "x-session-affinity",
  "x-request-id",
  "x-interaction-id",
  "x-client-session-id",
  "x-parent-session-id",
]

[copilot.default]
editor-version          = "vscode/1.95.0"
editor-plugin-version   = "copilot-chat/0.20.0"
user-agent              = "GitHubCopilotChat/0.20.0"
copilot-integration-id  = "vscode-chat"
openai-intent           = "conversation-panel"

[copilot-cli]
verified = false
forward = [
  "x-initiator",
  "x-interaction-id",
  "x-interaction-type",
  "x-client-session-id",
  "x-agent-task-id",
]

[copilot-cli.default]
openai-intent = "conversation-agent"
x-github-api-version = "2026-01-09"
copilot-integration-id = "copilot-developer-cli"
user-agent = "copilot/1.0.25 (client/sdk <os> <arch> v22.19.0) term/unknown"
accept-language = "*"
sec-fetch-mode = "cors"

[opencode]
verified = true
forward = [
  "anthropic-beta",
  "anthropic-version",
  "openai-intent",
  "x-initiator",
  "x-session-affinity",
]

[opencode.default]
user-agent = "opencode/1.14.28 ai-sdk/provider-utils/4.0.23 runtime/bun/1.3.13"
x-session-affinity = "<session_id>"

[opencode.github-copilot]
Openai-Intent = "conversation-edits"

[codex]
verified = true
forward = [
  "chatgpt-account-id",
  "openai-beta",
  "originator",
  "session_id",
  "x-project-cwd",
  "x-request-id",
]

[codex.default]
user-agent = "codex_cli_rs/0.114.0 (<os-pretty>; <arch>) WindowsTerminal"
originator = "codex_cli_rs"
chatgpt-account-id = "<account_id>"
x-request-id = "<request_id>"

[openclaw]
verified = false

[openclaw.default]
user-agent = "openclaw/0.x"

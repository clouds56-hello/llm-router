apiVersion: v1
listener:
  bind: 127.0.0.1:8787

providers:
  - name: openai
    kind: open_ai
    base_url: https://api.openai.com
    api_key_env: OPENAI_API_KEY
    timeout_ms: 30000
    backoff_ms: 10000

  - name: claude
    kind: claude
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    timeout_ms: 30000
    backoff_ms: 10000

  - name: copilot
    kind: copilot
    base_url: https://api.githubcopilot.com
    api_key_env: COPILOT_API_KEY
    timeout_ms: 30000
    backoff_ms: 10000

  - name: codex
    kind: codex
    base_url: https://api.openai.com
    api_key_env: CODEX_API_KEY
    timeout_ms: 30000
    backoff_ms: 10000

routes:
  - name: general-chat
    model_aliases: ["gpt-4o", "gpt-4.1", "claude-3-7-sonnet", "copilot-chat", "codex"]
    failover_chain: ["openai", "claude", "copilot", "codex"]
    retry_budget: 3
    circuit_open_after_failures: 3

  - name: embeddings
    model_aliases: ["text-embedding-3-large", "text-embedding-3-small"]
    failover_chain: ["openai", "copilot", "codex"]
    retry_budget: 2
    circuit_open_after_failures: 3

model_mappings:
  - public_model: gpt-4o
    provider: openai
    provider_model: gpt-4o

  - public_model: gpt-4.1
    provider: openai
    provider_model: gpt-4.1

  - public_model: claude-3-7-sonnet
    provider: claude
    provider_model: claude-3-7-sonnet-latest

  - public_model: copilot-chat
    provider: copilot
    provider_model: gpt-4o

  - public_model: codex
    provider: codex
    provider_model: gpt-4.1

  - public_model: text-embedding-3-large
    provider: openai
    provider_model: text-embedding-3-large

  - public_model: text-embedding-3-small
    provider: openai
    provider_model: text-embedding-3-small

viewer:
  enabled: true
  path_prefix: /viewer
  sqlite_path: llm-router.db
  max_rows: 100000
  max_age_seconds: 604800

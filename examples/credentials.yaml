providers:
  openai:
    accounts:
      - id: openai-default
        label: OpenAI Default
        auth_type: bearer
        is_default: true
        enabled: true
        secrets:
          api_key: ${OPENAI_API_KEY}
        meta: {}

  deepseek:
    accounts:
      - id: deepseek-default
        label: DeepSeek Default
        auth_type: bearer
        is_default: true
        enabled: true
        secrets:
          api_key: ${DEEPSEEK_API_KEY}
        meta: {}

  claude:
    accounts:
      - id: claude-default
        label: Claude Default
        auth_type: x-api-key
        is_default: true
        enabled: true
        secrets:
          api_key: ${ANTHROPIC_API_KEY}
        meta: {}

  github_copilot:
    accounts: []

copilot:
  deployment: github.com
  enterprise_domain:
